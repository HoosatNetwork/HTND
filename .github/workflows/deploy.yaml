name: Build and upload assets
on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    name: Building, ${{ matrix.os }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: true
          cache-dependency-path: go.sum
      - name: Build on Linux
        if: runner.os == 'Linux'
        env:
          GOEXPERIMENT: "simd,jsonv2"
        # `-extldflags=-static` - means static link everything,
        # `-tags netgo,osusergo` means use pure go replacements for "os/user" and "net"
        # `-s -w` strips the binary to produce smaller size binaries
        run: |
          mkdir -p bin
          go build -v -ldflags="-s -w -extldflags=-static" -tags netgo,osusergo -o ./bin/ . ./cmd/...
          archive="bin/HTND-${{ github.event.release.tag_name }}-linux-amd64.zip"
          asset_name="HTND-${{ github.event.release.tag_name }}-linux-amd64.zip"
          zip -r "${archive}" ./bin/*
          sha1sum "${archive}" > "${archive}.sha1sum"
          echo "archive=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV
      - name: Build on Windows
        if: runner.os == 'Windows'
        env:
          GOEXPERIMENT: "simd,jsonv2"        
        shell: bash        
        run: |
          mkdir -p bin
          go build -v -ldflags="-s -w" -o bin/ . ./cmd/...
          archive="bin/HTND-${{ github.event.release.tag_name }}-windows-amd64.zip"
          asset_name="HTND-${{ github.event.release.tag_name }}-windows-amd64.zip"
          powershell "Compress-Archive bin/* \"${archive}\""
          Get-FileHash "${archive}" -Algorithm SHA1 | ForEach-Object { $_.Hash + " *" + $_.Path } > "${archive}.sha1sum"
          echo "archive=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV
      - name: Build on MacOS
        if: runner.os == 'macOS'
        env:
          GOEXPERIMENT: "simd,jsonv2"
        run: |
          mkdir -p bin
          go build -v -ldflags="-s -w" -o ./bin/ . ./cmd/...
          archive="bin/HTND-${{ github.event.release.tag_name }}-osx.zip"
          asset_name="HTND-${{ github.event.release.tag_name }}-osx.zip"
          zip -r "${archive}" ./bin/*
          sha1sum "${archive}" > "${archive}.sha1sum"
          echo "archive=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ env.archive }}
